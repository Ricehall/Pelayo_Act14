<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#040354" />
  <title>AdDU Alumni — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #040354 0%, #0a0a6e 60%, #135BEC 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    .school-name {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .retry-btn {
      display: inline-block;
      padding: 13px 32px;
      background: #fff;
      color: #040354;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      margin-bottom: 12px;
      width: 100%;
    }
    .retry-btn:hover { background: rgba(255,255,255,0.9); }
    .home-btn {
      display: block;
      padding: 13px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      width: 100%;
    }
    .home-btn:hover { background: rgba(255,255,255,0.18); }
    .tip {
      margin-top: 24px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">📡</div>
    <p class="school-name">Ateneo de Davao University · Alumni Network</p>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      Some parts of the app may still work — try going back to the main dashboard.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
    <a class="home-btn" href="/">← Go to Dashboard</a>
    <p class="tip">Previously loaded pages are still available in cache.</p>
  </div>
</body>
</html>
